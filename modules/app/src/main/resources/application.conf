logviz.splunk {
  auth = "user-pass-auth"
  auth = ${?LOGVIZ_SPLUNK_AUTH_MODE}

  enabled = false
  enabled = ${?LOGVIZ_SPLUNK_ENABLED}

  uri = ${?LOGVIZ_SPLUNK_URI}
  source = ${?LOGVIZ_SPLUNK_QUERY_SOURCE}
  index = ${?LOGVIZ_SPLUNK_QUERY_INDEX}

  username = ${?LOGVIZ_SPLUNK_USERNAME}
  password = ${?LOGVIZ_SPLUNK_PASSWORD}
  token = ${?LOGVIZ_SPLUNK_TOKEN}
}